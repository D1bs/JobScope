<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobScope</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>JobScope</h1>
        <p>Анализ IT-вакансий</p>
    </header>

    <main>
        <section class="stats">
            <div class="card">
                <h3>Всего вакансий</h3>
                <p id="total-vacancies">—</p>
            </div>
            <div class="card">
                <h3>Средняя зарплата</h3>
                <p id="avg-salary">—</p>
            </div>
        </section>

        <section class="chart-section">
            <h2>Топ навыков</h2>
            <canvas id="skillsChart"></canvas>
        </section>

        <section class="actions">
            <button id="parse-btn">Запустить парсинг</button>
        </section>

        <section class="vacancies">
            <h2>Вакансии</h2>

            <div class="filters">
                <input id="searchInput" type="text" placeholder="Поиск по названию или компании" />
                <input id="salaryInput" type="number" placeholder="Зарплата от" min="0" step="10000" />

                <select id="scheduleSelect">
                    <option value="">График — любой</option>
                    <option value="Удалённая работа">Удалёнка</option>
                    <option value="Полный день">Полный день</option>
                    <option value="Гибкий график">Гибкий</option>
                </select>

                <select id="employmentSelect">
                    <option value="">Занятость — любая</option>
                    <option value="Полная занятость">Полная</option>
                    <option value="Частичная занятость">Частичная</option>
                    <option value="Проектная работа">Проектная</option>
                </select>

                <button onclick="applyFilters()">Найти</button>
                <button onclick="resetFilters()">Сбросить</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Название</th>
                        <th>Компания</th>
                        <th>Город</th>
                        <th>График</th>
                        <th>Занятость</th>
                        <th>Зарплата от</th>
                        <th>Зарплата до</th>
                    </tr>
                </thead>
                <tbody id="vacancies-table">
                </tbody>
            </table>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
